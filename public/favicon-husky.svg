<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Simple, clean wolf/husky face favicon in UW purple -->
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#4B2E83"/>
  
  <!-- Wolf face - white -->
  <g transform="translate(50, 52)">
    <!-- Ears -->
    <polygon points="-28,-30 -35,-48 -18,-35" fill="white"/>
    <polygon points="28,-30 35,-48 18,-35" fill="white"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="-10" rx="28" ry="32" fill="white"/>
    
    <!-- Inner ears -->
    <polygon points="-26,-28 -30,-40 -20,-32" fill="#B7A57A" opacity="0.5"/>
    <polygon points="26,-28 30,-40 20,-32" fill="#B7A57A" opacity="0.5"/>
    
    <!-- Snout -->
    <ellipse cx="0" cy="10" rx="16" ry="12" fill="#f0f0f0"/>
    
    <!-- Eyes -->
    <ellipse cx="-12" cy="-15" rx="6" ry="7" fill="#4B2E83"/>
    <circle cx="-10" cy="-16" r="2" fill="white"/>
    <ellipse cx="12" cy="-15" rx="6" ry="7" fill="#4B2E83"/>
    <circle cx="14" cy="-16" r="2" fill="white"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="8" rx="7" ry="5" fill="#2a2a3a"/>
    <ellipse cx="-2" cy="6" rx="2" ry="1.5" fill="white" opacity="0.3"/>
    
    <!-- Mouth line -->
    <path d="M-5 16 Q0 20 5 16" stroke="#4B2E83" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>
</svg>
