<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with UW purple gradient -->
  <defs>
    <linearGradient id="uwGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B2E83"/>
      <stop offset="100%" style="stop-color:#6B4EAD"/>
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="50" cy="50" r="48" fill="url(#uwGradient)"/>
  
  <!-- Husky head silhouette - white -->
  <g transform="translate(50, 48) scale(0.42)">
    <!-- Head outline -->
    <path d="M0 -70 L-45 -30 L-55 -45 L-65 -10 L-45 15 L-50 40 L-35 60 L0 85 L35 60 L50 40 L45 15 L65 -10 L55 -45 L45 -30 Z" 
          fill="white"/>
    <!-- Left ear inner -->
    <path d="M-45 -30 L-55 -45 L-65 -10 L-50 -5 Z" fill="#B7A57A" opacity="0.6"/>
    <!-- Right ear inner -->
    <path d="M45 -30 L55 -45 L65 -10 L50 -5 Z" fill="#B7A57A" opacity="0.6"/>
    <!-- Face marking -->
    <path d="M0 -25 L-15 10 L-10 45 L0 60 L10 45 L15 10 Z" fill="#4B2E83" opacity="0.15"/>
    <!-- Left eye -->
    <ellipse cx="-22" cy="5" rx="8" ry="10" fill="#4B2E83"/>
    <circle cx="-22" cy="5" r="4" fill="white"/>
    <!-- Right eye -->
    <ellipse cx="22" cy="5" rx="8" ry="10" fill="#4B2E83"/>
    <circle cx="22" cy="5" r="4" fill="white"/>
    <!-- Nose -->
    <ellipse cx="0" cy="40" rx="12" ry="8" fill="#1a1a2e"/>
    <ellipse cx="-3" cy="37" rx="3" ry="2" fill="white" opacity="0.3"/>
  </g>
</svg>
